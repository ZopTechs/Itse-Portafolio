<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/Styles.css">
    <title>Login | Portafolio ITSE</title>
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel" aria-labelledby="login-title">
            <div class="login-visual">
                <img class="brand-mark large" src="/assets/logo-it.png" alt="IT">
                <div>
                    <p class="eyebrow">Acceso personal</p>
                    <h1 id="login-title">Portafolio ITSE</h1>
                </div>
            </div>

            {{ error }}

            <form class="login-form" action="/login" method="post">
                <label for="usuario">Usuario</label>
                <input id="usuario" name="usuario" type="text" autocomplete="username" value="{{ username }}" required>

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button class="button button-primary" type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
