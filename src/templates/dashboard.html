<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/Styles.css">
    <title>Portafolio ITSE</title>
</head>
<body>
    {{ nav }}

    <main class="app-layout">
        <section class="dashboard-hero">
            <div>
                <p class="eyebrow">Mis materias</p>
                <h1>Portafolio escolar</h1>
                <p>Galerías organizadas para Inglés, Matemáticas, Redacción y Digitales.</p>
            </div>
            <a class="button button-primary" href="/subir">Subir foto</a>
        </section>

        {{ flash }}

        <section class="subject-grid" aria-label="Materias">
            {{ subject_cards }}
        </section>

        <section class="section-heading">
            <div>
                <p class="eyebrow">Recientes</p>
                <h2>Últimas fotos</h2>
            </div>
        </section>

        {{ recent_gallery }}
    </main>
</body>
</html>
